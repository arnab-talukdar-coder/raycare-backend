name: Deploy RayCare Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-raycare.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: raycare-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Build
        run: sam build --template template.yaml --use-container

      - name: Validate
        run: sam validate --template .aws-sam/build/template.yaml --lint

      - name: Deploy
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name raycare-backend \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              StageName=prod \
              JwtSecret=${{ secrets.JWT_SECRET }} \
              JwtIssuer=raycare-api \
              MedicalRecordsBucketName=${{ secrets.MEDICAL_RECORDS_BUCKET_NAME }}
